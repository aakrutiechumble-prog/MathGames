<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition – Grade 3 Mathematics | Innovine</title>
    <style>
        :root {
            --primary: #1e293b; /* Dark blue from Innovine logo */
            --accent: #e04e39;  /* Red/Orange from Innovine logo */
            --success: #22c55e;
            --error: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
        }

        #app-container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
        }

        #logo-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #logo-overlay img {
            max-width: 250px;
            height: auto;
        }

        .hidden { display: none !important; }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #timer {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--error);
            border: 2px solid var(--error);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff5f5; }
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #fff9db;
            border-radius: 8px;
            font-size: 0.95rem;
            text-align: left;
            border-left: 5px solid #fab005;
        }

        .main-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .main-btn:hover { opacity: 0.9; }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

    <div id="logo-overlay">
        <img src="assets/innovine-logo.png" alt="Innovine Solutions Logo">
    </div>

    <div id="app-container" class="hidden">
        <div id="intro-screen">
            <h2 style="color: var(--primary)">Addition – Grade 3 Mathematics</h2>
            <p>Welcome to the Innovine Learning Challenge!</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <button class="main-btn" onclick="startQuiz()">Start Activity</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="header-info">
                <div style="font-weight: bold">Score: <span id="current-score">0</span></div>
                <div id="timer">60s</div>
            </div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <h3 id="question-text" style="text-align: left"></h3>
            <div id="options-container"></div>
            <div id="feedback" class="explanation hidden"></div>
            <button id="next-btn" class="main-btn hidden" onclick="nextQuestion()" style="margin-top: 20px; width: 100%;">Next</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2 style="color: var(--primary)">Activity Completed!</h2>
            <div style="font-size: 3.5rem; font-weight: 800; color: var(--accent);" id="final-score">0/12</div>
            <p id="result-message" style="margin-bottom: 30px;"></p>
            <button class="main-btn" onclick="location.reload()">Restart</button>
        </div>
    </div>

    <audio id="snd-correct" src="assets/correct.mp3"></audio>
    <audio id="snd-wrong" src="assets/wrong.mp3"></audio>

    <script>
        const questions = [
            { q: "Riya has 125 stickers. She wants 150 stickers. She gets 23 more. Does she reach her goal?", a: ["Yes, she has more than 150", "Yes, she has exactly 150", "No, she has less than 150", "Cannot be found"], c: 2, e: "125 + 23 = 148. She still needs 2 more to reach 150!" },
            { q: "A teacher has 132 books. She buys some more and now has 150 books. How many books did she buy?", a: ["12", "18", "20", "28"], c: 1, e: "150 minus 132 equals 18 books bought." },
            { q: "A shop sold 210 notebooks in the morning. By afternoon, total sales became 255. How many notebooks were sold in the afternoon?", a: ["35", "40", "45", "50"], c: 2, e: "255 total - 210 morning = 45 notebooks in the afternoon." },
            { q: "A shop sold 120 pens and 80 pencils. How many more pens than pencils were sold?", a: ["20", "30", "40", "50"], c: 2, e: "120 - 80 = 40. There were 40 extra pens." },
            { q: "Class A collected 145 books and Class B collected 155 books. Which statement is correct?", a: ["Class A collected more books", "Class B collected 10 more books", "Both collected equal books", "Class B collected 20 more books"], c: 1, e: "155 is 10 more than 145 (155 - 145 = 10)." },
            { q: "Aarav solved: 120 + 25 = 135. What mistake did he make?", a: ["Added ones incorrectly", "Added tens incorrectly", "Ignored tens completely", "No mistake"], c: 1, e: "120 + 25 is 145. He likely added 2 + 1 incorrectly in the tens place." },
            { q: "Meera solved: 145 + 32 = 167. Which is correct?", a: ["Ones are added wrongly", "Tens are added wrongly", "Carry is missing", "Answer is correct"], c: 1, e: "145 + 32 = 177. The tens digit should be 7 (4+3)." },
            { q: "Rohan solved: 230 + 40 = 240. Why is this wrong?", a: ["Tens were not added correctly", "Ones were added wrongly", "Hundreds were added twice", "No mistake"], c: 0, e: "230 + 40 is 270. He only added 10 instead of 40." },
            { q: "Assertion: 40 + 30 = 70 | Reason: We add tens to tens.", a: ["Both are correct and reason explains assertion", "Both are correct but reason does not explain", "Assertion is correct, reason is wrong", "Both are wrong"], c: 0, e: "We always add digits of the same place value together." },
            { q: "Assertion: 125 + 25 = 150 | Reason: Adding 25 increases the number by 25", a: ["Both are correct and reason explains assertion", "Both are correct but reason does not explain", "Assertion is correct, reason is wrong", "Both are wrong"], c: 0, e: "Addition literally means increasing a total by the added amount." },
            { q: "A school needs 300 books. They got 145 on Day 1 and 155 on Day 2. They donate 20 books. Do they have enough?", a: ["Yes, exactly enough", "Yes, more than enough", "No, less than needed", "Cannot be found"], c: 2, e: "145+155=300, but 300 - 20 = 280. They are now 20 books short!" },
            { q: "Riya (135), Ameya (145), and Library (120) combined their books. How many groups of 100 can they make?", a: ["3", "4", "5", "6"], c: 1, e: "135 + 145 + 120 = 400. That makes 4 full hundreds." }
        ];

        let currentQ = 0;
        let score = 0;
        let attempts = 0;
        let timeLeft = 60;
        let timerInterval;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('logo-overlay').style.display = 'none';
                document.getElementById('app-container').classList.remove('hidden');
            }, 5000);
        };

        function startQuiz() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            attempts = 0;
            timeLeft = 60;
            document.getElementById('timer').innerText = timeLeft + "s";
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            
            const qData = questions[currentQ];
            document.getElementById('question-text').innerText = (currentQ + 1) + ". " + qData.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            qData.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });

            startTimer();
            updateProgress();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    revealCorrect();
                }
            }, 1000);
        }

        function checkAnswer(index, btn) {
            const correctIdx = questions[currentQ].c;
            if (index === correctIdx) {
                btn.classList.add('correct');
                playSound('snd-correct');
                if (attempts === 0) score++;
                document.getElementById('current-score').innerText = score;
                lockAndFinish();
            } else {
                attempts++;
                btn.classList.add('wrong');
                btn.disabled = true;
                playSound('snd-wrong');
                if (attempts >= 2) revealCorrect();
            }
        }

        function revealCorrect() {
            lockAndFinish();
            const btns = document.querySelectorAll('.option-btn');
            btns[questions[currentQ].c].classList.add('correct');
            const fb = document.getElementById('feedback');
            fb.innerText = "Hint: " + questions[currentQ].e;
            fb.classList.remove('hidden');
        }

        function lockAndFinish() {
            clearInterval(timerInterval);
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < questions.length) loadQuestion();
            else showResults();
        }

        function updateProgress() {
            document.getElementById('progress-fill').style.width = ((currentQ) / questions.length * 100) + "%";
        }

        function playSound(id) {
            const s = document.getElementById(id);
            if(s) { s.currentTime = 0; s.play().catch(e => {}); }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score + " / " + questions.length;
            document.getElementById('result-message').innerText = score > 8 ? "Excellent! You are an Addition Champion!" : "Good effort! Keep practicing to get even stronger!";
        }
    </script>
</body>
</html>
